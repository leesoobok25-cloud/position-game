name: Daily Pattern (Telegram)

# 매일 회화 핵심 '문장 패턴' 하나를 텔레그램으로 보냅니다 (문장 자동화 훈련).
on:
  schedule:
    # cron은 UTC 기준입니다. '0 4 * * *' = 매일 04:00 UTC = 13:00 KST(낮 1시).
    # 보내는 시간을 바꾸려면 아래 숫자를 조정하세요. (KST = UTC + 9시간)
    #   예) 낮 12시 KST -> '0 3 * * *'  /  오후 6시 KST -> '0 9 * * *'
    - cron: '0 4 * * *'
  # Actions 탭에서 'Run workflow' 버튼으로 직접 테스트할 수 있습니다.
  workflow_dispatch:

concurrency:
  group: daily-verb
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (text-to-speech)
        run: pip install gtts requests

      - name: Send today's pattern
        working-directory: english-telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 send_pattern.py
