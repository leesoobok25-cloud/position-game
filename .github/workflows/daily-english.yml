name: Daily English (Telegram)

# 매일 여행 영어 회화 스크립트를 텔레그램으로 보냅니다.
on:
  schedule:
    # cron은 UTC 기준입니다. '0 0 * * *' = 매일 00:00 UTC = 09:00 KST(한국).
    # 보내는 시간을 바꾸려면 아래 숫자를 조정하세요. (KST = UTC + 9시간)
    #   예) 아침 7시 KST -> '0 22 * * *'  /  아침 8시 KST -> '0 23 * * *'
    - cron: '0 0 * * *'
  # Actions 탭에서 'Run workflow' 버튼으로 직접 테스트할 수 있습니다.
  workflow_dispatch:

# 동시에 여러 번 실행되지 않도록 보장합니다.
concurrency:
  group: daily-english
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (text-to-speech)
        run: pip install gtts requests

      - name: Send today's English script
        working-directory: english-telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 send_daily.py
